<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 WBC — MLB Player Stats</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>2026 World Baseball Classic</h1>
      <p class="subtitle">MLB Player Box Scores by Team &amp; Date</p>
    </div>
  </header>

  <main>
    <section class="controls" id="controls">
      <div class="control-group">
        <label for="team-select">MLB Team</label>
        <select id="team-select" disabled>
          <option value="">Loading teams…</option>
        </select>
      </div>
      <div class="control-group">
        <label for="date-picker">Date</label>
        <input type="date" id="date-picker" disabled>
      </div>
    </section>

    <section id="debug-panel" style="background:#111;color:#0f0;font-family:monospace;font-size:12px;padding:8px;margin:8px 0;border-radius:4px;max-height:200px;overflow-y:auto;display:block;">
      <strong style="color:#ff0;">DEBUG</strong> <button onclick="document.getElementById('debug-panel').style.display='none'" style="float:right;font-size:10px;">hide</button>
      <div id="debug-log"></div>
    </section>
    <button id="debug-toggle" onclick="var p=document.getElementById('debug-panel');p.style.display=p.style.display==='none'?'block':'none';" style="font-size:11px;padding:2px 8px;margin:4px 0;opacity:0.5;">debug</button>

    <section id="results">
      <div class="splash">
        <p>Select an MLB team and date to see WBC box scores.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>Data from <a href="https://statsapi.mlb.com" target="_blank" rel="noopener">MLB Stats API</a>. 2026 World Baseball Classic.</p>
  </footer>

  <script src="app.js?v=2"></script>
</body>
</html>
